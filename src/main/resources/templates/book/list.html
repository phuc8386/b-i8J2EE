<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  layout:decorate="~{_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>Danh Sách Sách</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header d-flex justify-content-between align-items-center">
        <div>
          <h2 class="mb-1"><i class="bi bi-journals me-2"></i>Danh Sách Sách</h2>
          <p class="mb-0 opacity-75">Quản lý toàn bộ sách trong hệ thống</p>
        </div>
        <a th:href="@{/books/add}" class="btn btn-add" sec:authorize="hasRole('ADMIN')">
          <i class="bi bi-plus-circle me-1"></i>Thêm Sách Mới
        </a>
      </div>

      <!-- Câu 1 + 3 + 4: Form tìm kiếm, lọc category, sắp xếp -->
      <div class="card mb-3">
        <div class="card-body py-3">
          <form th:action="@{/books}" method="get" class="row g-2 align-items-end">
            <!-- Câu 1: Tìm kiếm theo keyword -->
            <div class="col-md-4">
              <label class="form-label mb-1"><i class="bi bi-search me-1"></i>Tìm kiếm</label>
              <input type="text" name="keyword" class="form-control" placeholder="Nhập tên sách..."
                     th:value="${keyword}" />
            </div>
            <!-- Câu 4: Lọc theo category -->
            <div class="col-md-3">
              <label class="form-label mb-1"><i class="bi bi-collection me-1"></i>Danh mục</label>
              <select name="categoryId" class="form-select">
                <option value="">-- Tất cả danh mục --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == categoryId}"></option>
              </select>
            </div>
            <!-- Câu 3: Sắp xếp theo giá -->
            <div class="col-md-3">
              <label class="form-label mb-1"><i class="bi bi-sort-numeric-down me-1"></i>Sắp xếp theo giá</label>
              <select name="sort" class="form-select">
                <option value="" th:selected="${sort == ''}">-- Mặc định --</option>
                <option value="asc" th:selected="${sort == 'asc'}">Giá tăng dần ↑</option>
                <option value="desc" th:selected="${sort == 'desc'}">Giá giảm dần ↓</option>
              </select>
            </div>
            <div class="col-md-2 d-flex gap-2">
              <button type="submit" class="btn btn-submit w-100">
                <i class="bi bi-funnel me-1"></i>Lọc
              </button>
              <a th:href="@{/books}" class="btn btn-outline-secondary w-100">
                <i class="bi bi-x-circle"></i>
              </a>
            </div>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Tên Sách</th>
                  <th>Tác Giả</th>
                  <th>Hình Ảnh</th>
                  <th>Giá (VNĐ)</th>
                  <th>Danh Mục</th>
                  <th class="text-center">Thao Tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="book, stat : ${books}">
                  <td th:text="${currentPage * 5 + stat.count}" class="fw-bold text-muted"></td>
                  <td><span class="fw-semibold" th:text="${book.title}"></span></td>
                  <td th:text="${book.author}"></td>
                  <td>
                    <img th:if="${book.image != null and !book.image.isEmpty()}"
                         th:src="${book.image}" alt="Book" class="book-img" />
                    <img th:unless="${book.image != null and !book.image.isEmpty()}"
                         src="https://placehold.co/70x90?text=No+Image" alt="No Image" class="book-img" />
                  </td>
                  <td>
                    <span class="fw-bold"
                          th:text="${#numbers.formatInteger(book.price, 0, 'COMMA')} + ' đ'"></span>
                  </td>
                  <td>
                    <span class="badge-category"
                          th:text="${book.category != null ? book.category.name : 'N/A'}"></span>
                  </td>
                  <td class="text-center">
                    <!-- Nút Add to Cart cho mọi user đã đăng nhập -->
                    <form th:action="@{/cart/add}" method="post" class="d-inline">
                      <input type="hidden" name="bookId" th:value="${book.id}" />
                      <input type="hidden" name="quantity" value="1" />
                      <input type="hidden" name="redirect" value="/books" />
                      <button type="submit" class="btn btn-cart btn-sm me-1">
                        <i class="bi bi-cart-plus-fill"></i> Thêm
                      </button>
                    </form>
                    <span sec:authorize="hasRole('ADMIN')">
                      <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-edit btn-sm me-1">
                        <i class="bi bi-pencil-fill"></i> Sửa
                      </a>
                      <a th:href="@{/books/delete/{id}(id=${book.id})}" class="btn btn-del btn-sm"
                         onclick="return confirm('Bạn có chắc muốn xóa sách này không?')">
                        <i class="bi bi-trash-fill"></i> Xóa
                      </a>
                    </span>
                  </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}">
                  <td colspan="7" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                    Không tìm thấy sách nào.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Câu 2: Phân trang -->
        <div class="card-footer bg-transparent py-3" th:if="${totalPages > 1}">
          <nav>
            <ul class="pagination justify-content-center mb-0">
              <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/books(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${currentPage - 1})}">
                  <i class="bi bi-chevron-left"></i> Previous
                </a>
              </li>
              <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                  th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/books(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${i})}"
                   th:text="${i + 1}"></a>
              </li>
              <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/books(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${currentPage + 1})}">
                  Next <i class="bi bi-chevron-right"></i>
                </a>
              </li>
            </ul>
          </nav>
          <p class="text-center text-muted small mt-2 mb-0">
            Trang <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span>
            &nbsp;|&nbsp; Tổng <span th:text="${bookPage.totalElements}"></span> sách
          </p>
        </div>
      </div>
    </div>

    <style>
      .btn-cart {
        background: linear-gradient(135deg, #00d4d4, #0099ff);
        border: none;
        color: white;
        font-weight: 700;
        border-radius: 10px;
        padding: 0.4rem 0.95rem;
        transition: all 0.2s;
        box-shadow: 0 4px 10px rgba(0, 153, 255, 0.3);
      }
      .btn-cart:hover {
        transform: translateY(-2px);
        color: white;
        box-shadow: 0 6px 16px rgba(0, 153, 255, 0.4);
      }
      .pagination .page-link {
        border-radius: 8px !important;
        margin: 0 2px;
        color: #7928ca;
        font-weight: 600;
        border: 2px solid rgba(121, 40, 202, 0.2);
      }
      .pagination .page-item.active .page-link {
        background: linear-gradient(135deg, #ff006e, #7928ca);
        border-color: transparent;
        color: white;
      }
      .pagination .page-item.disabled .page-link {
        color: #aaa;
      }
    </style>
  </body>
</html>
