<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>Đặt Hàng Thành Công</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="text-center py-5">
        <div class="success-icon mb-4">
          <i class="bi bi-check-circle-fill" style="font-size: 5rem; color: #00d4d4;"></i>
        </div>
        <h2 class="text-white fw-bold mb-2">Đặt hàng thành công!</h2>
        <p class="text-white-50 mb-4">Cảm ơn bạn đã mua sắm tại BookStore Manager</p>

        <div class="card mx-auto" style="max-width: 600px;">
          <div class="card-header">
            <i class="bi bi-receipt me-2"></i>Thông Tin Đơn Hàng #<span th:text="${order.id}"></span>
          </div>
          <div class="card-body">
            <div class="row mb-3">
              <div class="col-6 text-start text-muted">Người đặt:</div>
              <div class="col-6 text-end fw-bold" th:text="${order.accountName}"></div>
            </div>
            <div class="row mb-3">
              <div class="col-6 text-start text-muted">Ngày đặt:</div>
              <div class="col-6 text-end fw-bold"
                   th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></div>
            </div>
            <hr />
            <div th:each="detail : ${order.details}" class="row mb-2">
              <div class="col-6 text-start" th:text="${detail.book.title}"></div>
              <div class="col-3 text-center text-muted">x<span th:text="${detail.quantity}"></span></div>
              <div class="col-3 text-end fw-bold"
                   th:text="${#numbers.formatInteger(detail.subtotal, 0, 'COMMA')} + ' đ'"></div>
            </div>
            <hr />
            <div class="row">
              <div class="col-6 text-start fw-bold fs-5">Tổng cộng:</div>
              <div class="col-6 text-end fw-bold fs-4" style="color: #ff006e;"
                   th:text="${#numbers.formatInteger(order.totalAmount, 0, 'COMMA')} + ' đ'"></div>
            </div>
          </div>
        </div>

        <div class="mt-4">
          <a th:href="@{/books}" class="btn btn-add">
            <i class="bi bi-shop me-1"></i>Tiếp tục mua sắm
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
