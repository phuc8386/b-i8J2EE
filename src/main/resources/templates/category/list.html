<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>Danh Mục</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div
        class="page-header d-flex justify-content-between align-items-center"
      >
        <div>
          <h2 class="mb-1">
            <i class="bi bi-collection me-2"></i>Quản Lý Danh Mục
          </h2>
          <p class="mb-0 opacity-75">
            Quản lý các danh mục sách trong hệ thống
          </p>
        </div>
        <a th:href="@{/categories/add}" class="btn btn-add">
          <i class="bi bi-plus-circle me-1"></i>Thêm Danh Mục
        </a>
      </div>

      <div class="card" style="max-width: 700px; margin: 0 auto">
        <div class="card-body p-0">
          <table class="table mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Tên Danh Mục</th>
                <th class="text-center">Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="cat, stat : ${categories}">
                <td th:text="${stat.count}" class="fw-bold text-muted"></td>
                <td>
                  <i class="bi bi-tag-fill me-2 text-primary"></i>
                  <span class="fw-semibold" th:text="${cat.name}"></span>
                </td>
                <td class="text-center">
                  <a
                    th:href="@{/categories/edit/{id}(id=${cat.id})}"
                    class="btn btn-edit btn-sm me-1"
                  >
                    <i class="bi bi-pencil-fill"></i> Sửa
                  </a>
                  <a
                    th:href="@{/categories/delete/{id}(id=${cat.id})}"
                    class="btn btn-del btn-sm"
                    onclick="
                      return confirm(
                        'Xóa danh mục này? Các sách liên quan sẽ bị ảnh hưởng!',
                      );
                    "
                  >
                    <i class="bi bi-trash-fill"></i> Xóa
                  </a>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(categories)}">
                <td colspan="3" class="text-center text-muted py-4">
                  <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                  Chưa có danh mục nào.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
