<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>Thêm Danh Mục</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <h2 class="mb-1">
          <i class="bi bi-plus-circle me-2"></i>Thêm Danh Mục Mới
        </h2>
        <p class="mb-0 opacity-75">Tạo danh mục mới cho sách</p>
      </div>

      <div class="card form-card" style="max-width: 500px">
        <div class="card-header bg-white py-3">
          <h5 class="mb-0">
            <i class="bi bi-collection me-2 text-primary"></i>Thông Tin Danh Mục
          </h5>
        </div>
        <div class="card-body p-4">
          <form
            th:action="@{/categories/save}"
            th:object="${category}"
            method="post"
          >
            <div class="mb-4">
              <label for="name" class="form-label"
                ><i class="bi bi-tag me-1"></i>Tên Danh Mục
                <span class="text-danger">*</span></label
              >
              <input
                class="form-control"
                type="text"
                th:field="*{name}"
                id="name"
                placeholder="Ví dụ: Văn học, Khoa học..."
              />
              <div
                class="text-danger small mt-1"
                th:if="${#fields.hasErrors('name')}"
                th:errors="*{name}"
              ></div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-submit">
                <i class="bi bi-check-circle me-1"></i>Thêm Danh Mục
              </button>
              <a
                th:href="@{/categories}"
                class="btn btn-outline-secondary"
                style="border-radius: 10px"
              >
                <i class="bi bi-arrow-left me-1"></i>Quay Lại
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
