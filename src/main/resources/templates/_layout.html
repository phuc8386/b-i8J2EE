<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title layout:title-pattern="$CONTENT_TITLE - Quản Lý Sách">
      Quản Lý Sách
    </title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        font-family: "Segoe UI", sans-serif;
        min-height: 100vh;
      }
      .navbar {
        background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%) !important;
        box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
        border-bottom: 2px solid #00d4d4;
      }
      .navbar-brand {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #00d4d4, #ff006e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .navbar-brand i {
        color: #ff006e;
        font-size: 1.8rem;
      }
      .nav-link {
        font-weight: 600;
        transition: all 0.3s;
        color: #00d4d4 !important;
      }
      .nav-link:hover {
        color: #ff006e !important;
        text-shadow: 0 0 8px rgba(255, 0, 110, 0.5);
        transform: translateY(-2px);
      }
      .page-header {
        background: linear-gradient(135deg, #ff006e 0%, #7928ca 50%, #00d4d4 100%);
        color: white;
        padding: 2.5rem;
        border-radius: 20px;
        margin-bottom: 2rem;
        box-shadow: 0 12px 40px rgba(255, 0, 110, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .page-header h1 {
        font-weight: 800;
        font-size: 2.2rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }
      .card {
        border: none;
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0, 212, 212, 0.15);
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 212, 212, 0.2);
        transition: all 0.3s;
      }
      .card:hover {
        box-shadow: 0 12px 48px rgba(255, 0, 110, 0.2);
        transform: translateY(-4px);
      }
      .card-header {
        border-radius: 18px 18px 0 0 !important;
        font-weight: 700;
        background: linear-gradient(90deg, #ff006e 0%, #7928ca 100%);
        color: white;
        border: none;
      }
      .btn-add {
        background: linear-gradient(135deg, #00d4d4, #00ff41);
        border: none;
        color: #000;
        font-weight: 700;
        padding: 0.7rem 1.6rem;
        border-radius: 12px;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0, 212, 212, 0.3);
      }
      .btn-add:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 8px 25px rgba(0, 255, 65, 0.4);
        color: #000;
      }
      .table {
        border-radius: 12px;
        overflow: hidden;
      }
      .table thead th {
        background: linear-gradient(90deg, #ff006e, #7928ca);
        color: white;
        font-weight: 700;
        border: none;
        padding: 1rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .table tbody tr {
        transition: all 0.2s;
        border-bottom: 1px solid rgba(0, 212, 212, 0.1);
      }
      .table tbody tr:hover {
        background-color: rgba(0, 212, 212, 0.1);
        box-shadow: inset 0 0 10px rgba(0, 212, 212, 0.1);
      }
      .table td {
        vertical-align: middle;
        padding: 0.9rem 1rem;
        color: #333;
      }
      .book-img {
        width: 70px;
        height: 90px;
        object-fit: cover;
        border-radius: 10px;
        box-shadow: 0 4px 12px rgba(255, 0, 110, 0.2);
        border: 2px solid #00d4d4;
      }
      .badge-category {
        background: linear-gradient(135deg, #ff006e, #7928ca);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 25px;
        font-size: 0.85rem;
        font-weight: 700;
        box-shadow: 0 4px 12px rgba(255, 0, 110, 0.3);
      }
      .btn-edit {
        background: linear-gradient(135deg, #ffa500, #ffeb3b);
        border: none;
        color: #000;
        font-weight: 700;
        border-radius: 10px;
        padding: 0.4rem 0.95rem;
        transition: all 0.2s;
        box-shadow: 0 4px 10px rgba(255, 165, 0, 0.3);
      }
      .btn-edit:hover {
        transform: translateY(-2px);
        color: #000;
        box-shadow: 0 6px 16px rgba(255, 235, 59, 0.4);
      }
      .btn-del {
        background: linear-gradient(135deg, #ff0040, #ff0080);
        border: none;
        color: white;
        font-weight: 700;
        border-radius: 10px;
        padding: 0.4rem 0.95rem;
        transition: all 0.2s;
        box-shadow: 0 4px 10px rgba(255, 0, 80, 0.3);
      }
      .btn-del:hover {
        transform: translateY(-2px);
        color: white;
        box-shadow: 0 6px 16px rgba(255, 0, 80, 0.4);
      }
      .form-card {
        max-width: 680px;
        margin: 0 auto;
      }
      .form-label {
        font-weight: 700;
        color: #333;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-size: 0.9rem;
      }
      .form-control,
      .form-select {
        border-radius: 12px;
        border: 2px solid #e0e0e0;
        padding: 0.7rem 1.2rem;
        transition: all 0.3s;
        background-color: rgba(255, 255, 255, 0.98);
      }
      .form-control:focus,
      .form-select:focus {
        border-color: #00d4d4;
        box-shadow: 0 0 0 4px rgba(0, 212, 212, 0.2);
        background-color: white;
      }
      .upload-area {
        border: 3px dashed #ff006e;
        border-radius: 15px;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: linear-gradient(135deg, rgba(255, 0, 110, 0.05), rgba(0, 212, 212, 0.05));
      }
      .upload-area:hover {
        background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(0, 212, 212, 0.1));
        border-color: #00d4d4;
        box-shadow: 0 8px 25px rgba(255, 0, 110, 0.2);
      }
      .upload-area i {
        font-size: 2.5rem;
        background: linear-gradient(90deg, #ff006e, #00d4d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      #imagePreview {
        max-height: 160px;
        border-radius: 12px;
        margin-top: 1rem;
        display: none;
        box-shadow: 0 8px 20px rgba(0, 212, 212, 0.3);
        border: 2px solid #00d4d4;
      }
      .btn-submit {
        background: linear-gradient(135deg, #00d4d4, #00ff41);
        border: none;
        color: #000;
        font-weight: 800;
        padding: 0.8rem 2.2rem;
        border-radius: 12px;
        transition: all 0.3s;
        box-shadow: 0 6px 20px rgba(0, 255, 65, 0.3);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4);
        color: white;
      }
      footer {
        background: #1a1a2e;
        color: #aaa;
        padding: 1.2rem;
        margin-top: 3rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" th:href="@{/}"
          ><i class="bi bi-book-half me-2"></i>BookStore Manager</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-lg-center">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}"
                ><i class="bi bi-house me-1"></i>Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/books}"
                ><i class="bi bi-journals me-1"></i>Sách</a
              >
            </li>
            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
              <a class="nav-link" th:href="@{/categories}"
                ><i class="bi bi-collection me-1"></i>Danh Mục</a
              >
            </li>
            <li class="nav-item" sec:authorize="isAuthenticated()">
              <a class="nav-link" th:href="@{/cart}"
                ><i class="bi bi-cart3 me-1"></i>Giỏ Hàng</a
              >
            </li>
            <li class="nav-item ms-lg-3" sec:authorize="isAuthenticated()">
              <span class="text-light small">
                <i class="bi bi-person-circle me-1"></i>
                Xin chào, <strong sec:authentication="name"></strong>
              </span>
            </li>
            <li class="nav-item ms-lg-2" sec:authorize="isAuthenticated()">
              <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-light">
                  <i class="bi bi-box-arrow-right me-1"></i>Đăng xuất
                </button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4 body-content" layout:fragment="content"></div>

    <footer class="text-center">
      <p class="mb-0">
        <i class="bi bi-code-slash me-1"></i>© 2025 – Phát triển ứng dụng với
        J2EE
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Preview anh khi chon file
      document.addEventListener("DOMContentLoaded", function () {
        const fileInput = document.getElementById("imageFile");
        const preview = document.getElementById("imagePreview");
        if (fileInput && preview) {
          fileInput.addEventListener("change", function () {
            const file = this.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = "block";
              };
              reader.readAsDataURL(file);
            }
          });
        }
      });
    </script>
  </body>
</html>
