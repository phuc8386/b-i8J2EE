<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>Xác Nhận Đặt Hàng</title>
  </head>
  <body>
    <div layout:fragment="content">
      <div class="page-header">
        <h2 class="mb-1"><i class="bi bi-bag-check me-2"></i>Xác Nhận Đặt Hàng</h2>
        <p class="mb-0 opacity-75">Kiểm tra lại đơn hàng trước khi xác nhận</p>
      </div>

      <div class="card mb-3">
        <div class="card-header">
          <i class="bi bi-list-ul me-2"></i>Chi Tiết Đơn Hàng
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Tên Sách</th>
                  <th class="text-end">Đơn Giá</th>
                  <th class="text-center">Số Lượng</th>
                  <th class="text-end">Thành Tiền</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item, stat : ${cartItems}">
                  <td th:text="${stat.count}" class="text-muted fw-bold"></td>
                  <td class="fw-semibold" th:text="${item.title}"></td>
                  <td class="text-end"
                      th:text="${#numbers.formatInteger(item.price, 0, 'COMMA')} + ' đ'"></td>
                  <td class="text-center fw-bold" th:text="${item.quantity}"></td>
                  <td class="text-end fw-bold" style="color: #ff006e;"
                      th:text="${#numbers.formatInteger(item.subtotal, 0, 'COMMA')} + ' đ'"></td>
                </tr>
              </tbody>
              <tfoot>
                <tr style="background: rgba(255,0,110,0.08);">
                  <td colspan="4" class="text-end fw-bold fs-5">Tổng cộng:</td>
                  <td class="text-end fw-bold fs-4" style="color: #ff006e;"
                      th:text="${#numbers.formatInteger(total, 0, 'COMMA')} + ' đ'"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2">
        <a th:href="@{/cart}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left me-1"></i>Quay lại giỏ hàng
        </a>
        <form th:action="@{/cart/checkout}" method="post">
          <button type="submit" class="btn btn-checkout">
            <i class="bi bi-check-circle-fill me-1"></i>Xác Nhận Đặt Hàng
          </button>
        </form>
      </div>
    </div>

    <style>
      .btn-checkout {
        background: linear-gradient(135deg, #ff006e, #7928ca);
        border: none;
        color: white;
        font-weight: 700;
        padding: 0.7rem 1.8rem;
        border-radius: 12px;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
      }
      .btn-checkout:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(255, 0, 110, 0.4);
        color: white;
      }
    </style>
  </body>
</html>
